<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Robot State Estimation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #1F4E79;
      --blue-lt: #4A7FB5;
      --accent:  #D9531E;
      --bg:      #F2F4F7;
      --sidebar: 320px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: #222;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    nav {
      width: var(--sidebar);
      background: var(--blue);
      color: #fff;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .nav-header {
      padding: 1.4rem 1.1rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .nav-header h1 {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -.01em;
    }
    .nav-header p {
      margin-top: .4rem;
      font-size: .72rem;
      opacity: .55;
      line-height: 1.5;
    }
    .nav-header .dl {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      margin-top: .7rem;
      padding: .3rem .55rem;
      font-size: .7rem;
      background: rgba(255,255,255,.1);
      color: #fff;
      text-decoration: none;
      border-radius: 3px;
      transition: background .12s;
    }
    .nav-header .dl:hover { background: rgba(255,255,255,.18); }

    .nav-section { padding: .7rem 0 .4rem; }
    .nav-section-label {
      padding: .3rem 1.1rem;
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .09em;
      opacity: .45;
      font-weight: 600;
    }

    .nav-item {
      display: flex;
      align-items: flex-start;
      gap: .55rem;
      padding: .48rem 1.1rem;
      font-size: .8rem;
      line-height: 1.4;
      opacity: .82;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .12s, opacity .12s, border-color .12s;
      user-select: none;
    }
    .nav-item:hover  { background: rgba(255,255,255,.09); opacity: 1; }
    .nav-item.active { background: rgba(255,255,255,.13); opacity: 1; border-left-color: var(--accent); }
    .nav-item .pg {
      margin-left: auto;
      font-size: .65rem;
      opacity: .55;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .nav-footer {
      margin-top: auto;
      padding: .9rem 1.1rem;
      font-size: .68rem;
      opacity: .45;
      border-top: 1px solid rgba(255,255,255,.1);
      line-height: 1.6;
    }
    .nav-footer a { color: #fff; }

    /* ── Main area ── */
    main {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
      scroll-padding-top: 56px; /* clear sticky toolbar on jumps */
    }

    #toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid #dde1e7;
      padding: .55rem 1.2rem;
      display: flex;
      align-items: center;
      gap: .9rem;
      font-size: .8rem;
      color: #555;
    }
    #toolbar strong { color: #222; font-size: .85rem; }
    #toolbar .pages { opacity: .65; font-variant-numeric: tabular-nums; }
    #toolbar .spacer { margin-left: auto; }
    #toolbar button {
      background: #f4f6f9;
      border: 1px solid #d6dbe1;
      color: #333;
      padding: .32rem .75rem;
      border-radius: 4px;
      font-size: .75rem;
      cursor: pointer;
      font-family: inherit;
      transition: background .12s, border-color .12s;
    }
    #toolbar button:hover { background: #e8ecf1; border-color: #b9c1cb; }
    #toolbar .hint {
      font-size: .7rem;
      opacity: .5;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    #toolbar .zoom-group {
      display: flex;
      align-items: center;
      gap: .2rem;
    }
    #toolbar button.zoom-btn {
      padding: .22rem .55rem;
      font-size: .9rem;
      line-height: 1;
      min-width: 1.8rem;
    }
    #toolbar .zoom-label {
      min-width: 3.2rem;
      text-align: center;
      font-size: .75rem;
      font-variant-numeric: tabular-nums;
      color: #555;
      cursor: pointer;
      user-select: none;
      padding: .2rem .3rem;
      border-radius: 3px;
    }
    #toolbar .zoom-label:hover { background: #f4f6f9; color: #222; }

    #viewer {
      max-width: 1040px;
      margin: 1.6rem auto 3rem;
      padding: 0 1.2rem;
    }
    #viewer.two-up {
      max-width: 1700px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
    }
    #viewer.two-up .page-wrap { margin-bottom: 0; }

    .page-wrap {
      position: relative;
      margin-bottom: .6rem;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 2px 14px rgba(0,0,0,.13);
      overflow: hidden;
    }
    .page-wrap canvas {
      width: 100%;
      display: block;
      background: #fff;
    }
    .page-wrap.placeholder {
      background: #e7ecf1;
      box-shadow: none;
    }
    .page-wrap.placeholder::before {
      content: attr(data-page-num);
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b3bdc9;
      font-size: 1rem;
      font-weight: 500;
    }
    .page-num {
      position: absolute;
      bottom: .4rem;
      right: .6rem;
      font-size: .65rem;
      background: rgba(0,0,0,.38);
      color: #fff;
      padding: .15rem .45rem;
      border-radius: 3px;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Text layer ── */
    .textLayer {
      position: absolute;
      top: 0; left: 0;
      overflow: hidden;
      line-height: 1;
      z-index: 1;
    }
    .textLayer span,
    .textLayer br {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
      user-select: text;
    }
    .textLayer ::selection      { background: rgba(0,100,255,.25); color: transparent; }
    .textLayer ::-moz-selection { background: rgba(0,100,255,.25); color: transparent; }

    #status {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: #8a9ab0;
      gap: .7rem;
      font-size: .9rem;
    }
    #status .big { font-size: 2.5rem; }

    .progress-bar {
      width: 220px;
      height: 3px;
      background: #dde1e7;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .15s;
    }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<nav>
  <div class="nav-header">
    <h1>Modern Robot<br>State Estimation</h1>
    <p>10회차 통합 강의 · ESKF / MSCKF / FAST-LIO / Factor Graphs</p>
    <a class="dl" href="output/lecture_all_v2.pdf" download>↓ PDF 다운로드</a>
  </div>

  <div class="nav-section">
    <div class="nav-section-label" id="toc-label">목차 로딩 중…</div>
    <div id="toc"></div>
  </div>

  <div class="nav-footer">
    <a href="https://github.com/gisbi-kim/modern-robot-state-estimation" target="_blank">GitHub ↗</a>
  </div>
</nav>

<!-- ── Main ── -->
<main id="main">
  <div id="toolbar" style="display:none">
    <strong id="toolbar-title">Modern Robot State Estimation</strong>
    <span class="pages" id="toolbar-pages"></span>
    <span class="spacer"></span>
    <span class="hint">↑/↓ 이동 · Ctrl+휠 확대</span>
    <span class="zoom-group">
      <button class="zoom-btn" id="zoom-out" type="button" title="축소 (Ctrl+−)">−</button>
      <span class="zoom-label" id="zoom-label" title="100%로 리셋 (Ctrl+0)">100%</span>
      <button class="zoom-btn" id="zoom-in" type="button" title="확대 (Ctrl+=)">+</button>
    </span>
    <button id="layout-toggle" type="button">2쪽 보기</button>
  </div>

  <div id="status">
    <span class="big">⏳</span>
    <span id="status-msg">PDF 로딩 중…</span>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  </div>

  <div id="viewer"></div>
</main>

<script type="module">
  const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
  const { getDocument, GlobalWorkerOptions } = pdfjsLib;
  const renderTextLayer = pdfjsLib.renderTextLayer ?? pdfjsLib.default?.renderTextLayer;
  GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

  const PDF_LOCAL = 'output/lecture_all_v2.pdf';
  const PDF_CDN   = 'https://cdn.jsdelivr.net/gh/gisbi-kim/modern-robot-state-estimation@main/output/lecture_all_v2.pdf';

  async function resolvePdfUrl() {
    try {
      const r = await fetch(PDF_LOCAL, { method: 'HEAD' });
      if (r.ok) return PDF_LOCAL;
    } catch {}
    return PDF_CDN;
  }

  const viewer    = document.getElementById('viewer');
  const status    = document.getElementById('status');
  const statusMsg = document.getElementById('status-msg');
  const toolbar   = document.getElementById('toolbar');
  const tbPages   = document.getElementById('toolbar-pages');
  const main      = document.getElementById('main');
  const tocEl     = document.getElementById('toc');
  const tocLabel  = document.getElementById('toc-label');

  // page-wrap elements indexed by 0-based page index
  const pageEls = [];
  // page index → outline item DOM (for active highlighting)
  const sectionStartPages = []; // sorted [{ page, navEl }]

  let pdf;
  let renderInFlight = new Map(); // pageIdx → promise
  const renderedPages = new Set();

  let aspectRatio   = 9 / 16;     // height per width — captured from page 1
  let layout        = 'one-up';   // 'one-up' | 'two-up'
  let renderGen     = 0;          // bumps on layout change → in-flight renders abort
  let currentPageIdx = 0;         // topmost visible page (for keyboard nav)
  let pageIO        = null;
  let sectionIO     = null;
  let zoomLevel     = 1.0;        // 0.5 ~ 2.0
  let zoomDebounceTimer = null;
  const ZOOM_MIN = 0.5, ZOOM_MAX = 2.0, ZOOM_STEP = 0.1;
  const BASE_W_ONE_UP = 1040, BASE_W_TWO_UP = 1700;

  async function init() {
    const url = await resolvePdfUrl();
    pdf = await getDocument(url).promise;
    const n = pdf.numPages;

    // measure first page to size all placeholders identically
    // (Beamer slides are uniform 16:9)
    const probe = document.createElement('div');
    probe.className = 'page-wrap';
    probe.style.visibility = 'hidden';
    viewer.appendChild(probe);
    const cssW = probe.getBoundingClientRect().width;
    viewer.removeChild(probe);

    const firstPage = await pdf.getPage(1);
    const vp0 = firstPage.getViewport({ scale: 1 });
    aspectRatio = vp0.height / vp0.width;
    const placeholderH = Math.round(cssW * aspectRatio);

    // sidebar
    await buildOutline();

    // create placeholders for every page
    for (let i = 1; i <= n; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'page-wrap placeholder';
      wrap.style.height = placeholderH + 'px';
      wrap.dataset.page = i;
      wrap.dataset.pageNum = `${i} / ${n}`;
      pageEls.push(wrap);
      viewer.appendChild(wrap);
    }

    // toolbar
    tbPages.textContent = `${n}페이지`;
    toolbar.style.display = 'flex';
    status.style.display = 'none';

    setupLazyRender();
    setupActiveSectionTracking();
    setupKeyboardNav();
    setupLayoutToggle();
    setupZoom();
  }

  /* ─── Outline (TOC) ─── */

  async function resolveDest(dest) {
    if (!dest) return null;
    if (typeof dest === 'string') {
      try { dest = await pdf.getDestination(dest); } catch { return null; }
    }
    if (!Array.isArray(dest) || !dest[0]) return null;
    try {
      const idx = await pdf.getPageIndex(dest[0]);
      return idx; // 0-based
    } catch { return null; }
  }

  async function flattenOutline(items, depth, out) {
    for (const item of items || []) {
      const pageIdx = await resolveDest(item.dest);
      out.push({ title: item.title, pageIdx, depth });
      if (item.items && item.items.length) {
        await flattenOutline(item.items, depth + 1, out);
      }
    }
  }

  async function buildOutline() {
    let outline = null;
    try { outline = await pdf.getOutline(); } catch {}

    if (!outline || outline.length === 0) {
      tocLabel.textContent = '전체 PDF';
      const div = document.createElement('div');
      div.className = 'nav-item active';
      div.textContent = '처음으로';
      div.addEventListener('click', () => jumpToPage(0));
      tocEl.appendChild(div);
      return;
    }

    const flat = [];
    await flattenOutline(outline, 0, flat);

    tocLabel.textContent = '목차';

    // 사이드바 맨 위: "처음으로" (표지 페이지로 점프, active 추적 대상 아님)
    {
      const div = document.createElement('div');
      div.className = 'nav-item';
      div.style.paddingLeft = '1.1rem';
      div.dataset.page = 0;

      const label = document.createElement('span');
      label.textContent = '처음으로';
      div.appendChild(label);

      const pg = document.createElement('span');
      pg.className = 'pg';
      pg.textContent = 'p.1';
      div.appendChild(pg);

      div.addEventListener('click', () => {
        setActive(div);
        jumpToPage(0);
      });
      tocEl.appendChild(div);
    }

    flat.forEach(({ title, pageIdx, depth }) => {
      const div = document.createElement('div');
      div.className = 'nav-item';
      div.style.paddingLeft = (1.1 + depth * 0.85) + 'rem';
      div.dataset.page = pageIdx ?? '';

      const label = document.createElement('span');
      label.textContent = title;
      div.appendChild(label);

      if (pageIdx != null) {
        const pg = document.createElement('span');
        pg.className = 'pg';
        pg.textContent = `p.${pageIdx + 1}`;
        div.appendChild(pg);

        div.addEventListener('click', () => {
          setActive(div);
          jumpToPage(pageIdx);
        });
        sectionStartPages.push({ page: pageIdx, navEl: div });
      }
      tocEl.appendChild(div);
    });

    // 정적 추가: PDF outline에 안 잡히는 마무리 챕터 (p.903~)
    const FINAL_PAGE_IDX = 902; // 0-based
    if (FINAL_PAGE_IDX < pdf.numPages) {
      const div = document.createElement('div');
      div.className = 'nav-item';
      div.style.paddingLeft = '1.1rem';
      div.dataset.page = FINAL_PAGE_IDX;

      const label = document.createElement('span');
      label.textContent = '마무리';
      div.appendChild(label);

      const pg = document.createElement('span');
      pg.className = 'pg';
      pg.textContent = `p.${FINAL_PAGE_IDX + 1}`;
      div.appendChild(pg);

      div.addEventListener('click', () => {
        setActive(div);
        jumpToPage(FINAL_PAGE_IDX);
      });
      sectionStartPages.push({ page: FINAL_PAGE_IDX, navEl: div });
      tocEl.appendChild(div);
    }

    sectionStartPages.sort((a, b) => a.page - b.page);
    if (sectionStartPages[0]) setActive(sectionStartPages[0].navEl);
  }

  function setActive(el) {
    tocEl.querySelectorAll('.nav-item.active').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    // keep active item visible in sidebar
    const navEl = document.querySelector('nav');
    const r = el.getBoundingClientRect();
    const nr = navEl.getBoundingClientRect();
    if (r.top < nr.top || r.bottom > nr.bottom) {
      el.scrollIntoView({ block: 'nearest' });
    }
  }

  function jumpToPage(idx) {
    const el = pageEls[idx];
    if (!el) return;
    currentPageIdx = idx;
    el.scrollIntoView({ block: 'start' });
  }

  /* ─── Lazy rendering ─── */

  function setupLazyRender() {
    if (pageIO) pageIO.disconnect();
    pageIO = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const idx = parseInt(entry.target.dataset.page, 10) - 1;
          renderPage(idx);
        }
      });
    }, {
      root: main,
      rootMargin: '600px 0px 600px 0px',
    });
    pageEls.forEach(el => pageIO.observe(el));
  }

  async function renderPage(idx) {
    if (renderedPages.has(idx)) return;
    if (renderInFlight.has(idx)) return renderInFlight.get(idx);

    const wrap = pageEls[idx];
    const myGen = renderGen;

    const promise = (async () => {
      const page = await pdf.getPage(idx + 1);
      if (myGen !== renderGen) return;

      const DPR  = Math.min(window.devicePixelRatio || 1, 2);
      const cssW = wrap.getBoundingClientRect().width;
      const vp0  = page.getViewport({ scale: 1 });
      const scale    = (cssW * DPR) / vp0.width;
      const vp       = page.getViewport({ scale });
      const cssScale = cssW / vp0.width;
      const vpCSS    = page.getViewport({ scale: cssScale });

      const canvas = document.createElement('canvas');
      canvas.width  = vp.width;
      canvas.height = vp.height;

      const renderTask = page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
      try {
        await renderTask.promise;
      } catch (e) {
        if (e && e.name === 'RenderingCancelledException') return;
        throw e;
      }
      if (myGen !== renderGen) return;

      const textLayerDiv = document.createElement('div');
      textLayerDiv.className = 'textLayer';
      textLayerDiv.style.width  = vpCSS.width  + 'px';
      textLayerDiv.style.height = vpCSS.height + 'px';

      const num = document.createElement('div');
      num.className = 'page-num';
      num.textContent = `${idx + 1} / ${pdf.numPages}`;

      wrap.innerHTML = '';
      wrap.classList.remove('placeholder');
      wrap.style.height = ''; // let canvas govern height
      wrap.appendChild(canvas);
      wrap.appendChild(textLayerDiv);
      wrap.appendChild(num);

      if (typeof renderTextLayer === 'function') {
        renderTextLayer({
          textContentSource: page.streamTextContent(),
          container: textLayerDiv,
          viewport: vpCSS,
        });
      }
      renderedPages.add(idx);
    })().catch(err => console.error('render fail p' + (idx+1), err));

    renderInFlight.set(idx, promise);
    promise.finally(() => renderInFlight.delete(idx));
    return promise;
  }

  /* ─── Active section tracking based on scroll ─── */

  function setupActiveSectionTracking() {
    if (sectionIO) sectionIO.disconnect();
    sectionIO = new IntersectionObserver((entries) => {
      // pick the topmost visible page as "current"
      const visible = entries.filter(e => e.isIntersecting)
                             .map(e => parseInt(e.target.dataset.page, 10) - 1)
                             .sort((a, b) => a - b);
      if (!visible.length) return;
      const cur = visible[0];
      currentPageIdx = cur;

      if (!sectionStartPages.length) return;
      // find largest sectionStartPages.page <= cur
      let active = sectionStartPages[0];
      for (const s of sectionStartPages) {
        if (s.page <= cur) active = s; else break;
      }
      if (active && !active.navEl.classList.contains('active')) {
        setActive(active.navEl);
      }
    }, {
      root: main,
      rootMargin: '-10% 0px -80% 0px',
    });
    pageEls.forEach(el => sectionIO.observe(el));
  }

  /* ─── Keyboard navigation ─── */

  function setupKeyboardNav() {
    document.addEventListener('keydown', (e) => {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;

      if (e.ctrlKey || e.metaKey) {
        if (e.key === '=' || e.key === '+') { e.preventDefault(); setZoom(zoomLevel + ZOOM_STEP); return; }
        if (e.key === '-')                  { e.preventDefault(); setZoom(zoomLevel - ZOOM_STEP); return; }
        if (e.key === '0')                  { e.preventDefault(); setZoom(1.0); return; }
        return; // don't shadow other Ctrl shortcuts
      }
      if (e.altKey) return;

      let delta = 0;
      if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') delta = 1;
      else if (e.key === 'ArrowUp' || e.key === 'PageUp') delta = -1;
      else if (e.key === 'Home') { e.preventDefault(); jumpToPage(0); return; }
      else if (e.key === 'End')  { e.preventDefault(); jumpToPage(pdf.numPages - 1); return; }
      else return;

      e.preventDefault();
      const step = layout === 'two-up' ? 2 : 1;
      const next = Math.max(0, Math.min(pdf.numPages - 1, currentPageIdx + delta * step));
      jumpToPage(next);
    });
  }

  /* ─── Layout toggle (1쪽 ↔ 2쪽) ─── */

  function setupLayoutToggle() {
    const btn = document.getElementById('layout-toggle');
    btn.addEventListener('click', () => toggleLayout(btn));
  }

  function toggleLayout(btn) {
    layout = layout === 'one-up' ? 'two-up' : 'one-up';
    viewer.classList.toggle('two-up', layout === 'two-up');
    btn.textContent = layout === 'two-up' ? '1쪽 보기' : '2쪽 보기';
    applyViewerWidth();
    relayout();
  }

  /* ─── Zoom ─── */

  function setupZoom() {
    document.getElementById('zoom-in').addEventListener('click',
      () => setZoom(zoomLevel + ZOOM_STEP));
    document.getElementById('zoom-out').addEventListener('click',
      () => setZoom(zoomLevel - ZOOM_STEP));
    document.getElementById('zoom-label').addEventListener('click',
      () => setZoom(1.0));

    // Ctrl/Cmd + wheel
    main.addEventListener('wheel', (e) => {
      if (!e.ctrlKey && !e.metaKey) return;
      e.preventDefault();
      const dir = e.deltaY < 0 ? 1 : -1;
      setZoom(zoomLevel + dir * ZOOM_STEP);
    }, { passive: false });

    applyViewerWidth(); // ensure inline max-width matches initial zoom
  }

  function applyViewerWidth() {
    const baseW = layout === 'two-up' ? BASE_W_TWO_UP : BASE_W_ONE_UP;
    viewer.style.maxWidth = (baseW * zoomLevel) + 'px';
  }

  function setZoom(z) {
    const clamped = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.round(z * 100) / 100));
    if (Math.abs(clamped - zoomLevel) < 0.001) return;
    zoomLevel = clamped;
    document.getElementById('zoom-label').textContent = Math.round(zoomLevel * 100) + '%';
    applyViewerWidth();
    // debounce the heavy relayout — wheel fires fast
    clearTimeout(zoomDebounceTimer);
    zoomDebounceTimer = setTimeout(() => relayout(), 150);
  }

  /* ─── Shared relayout (used by toggle + zoom) ─── */

  function relayout() {
    renderGen++;
    requestAnimationFrame(() => {
      const cssW = pageEls[0].getBoundingClientRect().width;
      const placeholderH = Math.round(cssW * aspectRatio);

      pageEls.forEach((wrap) => {
        wrap.innerHTML = '';
        wrap.classList.add('placeholder');
        wrap.style.height = placeholderH + 'px';
      });
      renderedPages.clear();

      setupLazyRender();
      setupActiveSectionTracking();
      jumpToPage(currentPageIdx);
    });
  }

  /* ─── Boot ─── */

  init().catch(err => {
    statusMsg.textContent = '오류: ' + err.message;
    document.getElementById('prog').style.background = '#c0392b';
  });
</script>
</body>
</html>
