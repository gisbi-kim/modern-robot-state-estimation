<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Robot State Estimation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #1F4E79;
      --blue-lt: #4A7FB5;
      --accent:  #D9531E;
      --bg:      #F2F4F7;
      --sidebar: 320px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: #222;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    nav {
      width: var(--sidebar);
      background: var(--blue);
      color: #fff;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      transition: transform .22s ease, margin-left .22s ease, opacity .15s;
    }
    nav.collapsed {
      transform: translateX(-100%);
      margin-left: calc(-1 * var(--sidebar));
      opacity: 0;
      pointer-events: none;
    }

    .nav-header {
      padding: 1.4rem 1.1rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .nav-header h1 {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -.01em;
    }
    .nav-header p {
      margin-top: .4rem;
      font-size: .72rem;
      opacity: .55;
      line-height: 1.5;
    }
    .nav-header .dl {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      margin-top: .7rem;
      padding: .3rem .55rem;
      font-size: .7rem;
      background: rgba(255,255,255,.1);
      color: #fff;
      text-decoration: none;
      border-radius: 3px;
      transition: background .12s;
    }
    .nav-header .dl:hover { background: rgba(255,255,255,.18); }

    .nav-section { padding: .7rem 0 .4rem; }
    .nav-section-label {
      padding: .3rem 1.1rem;
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .09em;
      opacity: .45;
      font-weight: 600;
    }

    .nav-item {
      display: flex;
      align-items: flex-start;
      gap: .55rem;
      padding: .48rem 1.1rem;
      font-size: .8rem;
      line-height: 1.4;
      opacity: .82;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .12s, opacity .12s, border-color .12s;
      user-select: none;
    }
    .nav-item:hover  { background: rgba(255,255,255,.09); opacity: 1; }
    .nav-item.active { background: rgba(255,255,255,.13); opacity: 1; border-left-color: var(--accent); }
    .nav-item .pg {
      margin-left: auto;
      font-size: .65rem;
      opacity: .55;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .nav-footer {
      margin-top: auto;
      padding: .9rem 1.1rem;
      font-size: .68rem;
      opacity: .45;
      border-top: 1px solid rgba(255,255,255,.1);
      line-height: 1.6;
    }
    .nav-footer a { color: #fff; }

    /* ── Main area ── */
    main {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
      scroll-padding-top: 56px; /* clear sticky toolbar on jumps; JS bumps it on mobile */
    }

    #toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid #dde1e7;
      padding: .55rem 1.2rem;
      display: flex;
      align-items: center;
      gap: .9rem;
      font-size: .8rem;
      color: #555;
    }
    #toolbar strong { color: #222; font-size: .85rem; }
    #toolbar .pages { opacity: .65; font-variant-numeric: tabular-nums; }
    #toolbar .spacer { margin-left: auto; }
    #toolbar button {
      background: #f4f6f9;
      border: 1px solid #d6dbe1;
      color: #333;
      padding: .32rem .75rem;
      border-radius: 4px;
      font-size: .75rem;
      cursor: pointer;
      font-family: inherit;
      transition: background .12s, border-color .12s;
    }
    #toolbar button:hover { background: #e8ecf1; border-color: #b9c1cb; }
    #toolbar #sidebar-toggle {
      padding: .22rem .55rem;
      font-size: 1rem;
      line-height: 1;
    }
    #toolbar #sidebar-toggle.active {
      background: #1F4E79;
      color: #fff;
      border-color: #143a5c;
    }
    #toolbar .hint {
      font-size: .7rem;
      opacity: .5;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    #toolbar .zoom-group {
      display: flex;
      align-items: center;
      gap: .2rem;
    }
    #toolbar button.zoom-btn {
      padding: .22rem .55rem;
      font-size: .9rem;
      line-height: 1;
      min-width: 1.8rem;
    }
    #toolbar .zoom-label {
      min-width: 3.2rem;
      text-align: center;
      font-size: .75rem;
      font-variant-numeric: tabular-nums;
      color: #555;
      cursor: pointer;
      user-select: none;
      padding: .2rem .3rem;
      border-radius: 3px;
    }
    #toolbar .zoom-label:hover { background: #f4f6f9; color: #222; }

    /* Page input + total */
    #toolbar .pages {
      display: flex;
      align-items: center;
      gap: .3rem;
      font-variant-numeric: tabular-nums;
      opacity: .9;
    }
    #toolbar .pages .page-total {
      font-size: .75rem;
      color: #888;
    }
    #toolbar #page-input {
      width: 4em;
      font-size: .8rem;
      padding: .18rem .35rem;
      border: 1px solid #d6dbe1;
      border-radius: 3px;
      background: #f4f6f9;
      color: #222;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-family: inherit;
      -moz-appearance: textfield;
    }
    #toolbar #page-input::-webkit-outer-spin-button,
    #toolbar #page-input::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    #toolbar #page-input:focus {
      background: #fff;
      border-color: #4A7FB5;
      outline: none;
    }

    /* Search */
    #toolbar .search-wrap { position: relative; }
    #toolbar #search-input {
      width: 11em;
      font-size: .78rem;
      padding: .22rem .55rem;
      border: 1px solid #d6dbe1;
      border-radius: 3px;
      background: #f4f6f9;
      color: #222;
      font-family: inherit;
      transition: width .15s, border-color .12s, background .12s;
    }
    #toolbar #search-input:focus {
      background: #fff;
      border-color: #4A7FB5;
      outline: none;
      width: 16em;
    }
    #search-results {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: #fff;
      border: 1px solid #d6dbe1;
      border-radius: 4px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.15);
      width: 30rem;
      max-height: 60vh;
      overflow-y: auto;
      z-index: 20;
      display: none;
    }
    #search-results.open { display: block; }
    .search-result {
      padding: .5rem .75rem;
      border-bottom: 1px solid #f0f3f7;
      cursor: pointer;
      font-size: .78rem;
      line-height: 1.5;
      color: #333;
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:hover { background: #f4f6f9; }
    .search-result .result-page {
      font-weight: 600;
      color: #1F4E79;
      margin-right: .5rem;
      font-variant-numeric: tabular-nums;
    }
    .search-result .match {
      background: #FFE680;
      color: #4A3208;
      font-weight: 700;
      padding: 0 2px;
      border-radius: 2px;
    }
    .search-status {
      padding: .65rem .75rem;
      font-size: .75rem;
      color: #888;
      text-align: center;
    }

    /* ── Mobile (< 768px) ── */
    @media (max-width: 768px) {
      #toolbar {
        flex-wrap: wrap;
        gap: .45rem .5rem;
        padding: .45rem .6rem;
        font-size: .75rem;
      }
      /* hide things that don't fit / aren't useful on a phone */
      #toolbar #toolbar-title { display: none; }
      #toolbar .hint          { display: none; }
      #toolbar #layout-toggle { display: none; }
      #toolbar .spacer        { display: none; }

      /* compact inputs */
      #toolbar #page-input         { width: 3.2em; }
      #toolbar #search-input       { width: 7.5em; }
      #toolbar #search-input:focus { width: 11em; }
      #search-results              { width: calc(100vw - 1.2rem); }
      #toolbar .zoom-label         { min-width: 2.6rem; }

      /* tighter page padding so the slide is closer to the screen edge */
      #viewer { padding: 0 .5rem; }
    }

    #viewer {
      max-width: 1040px;
      margin: 1.6rem auto 3rem;
      padding: 0 1.2rem;
    }
    #viewer.two-up {
      max-width: 1700px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
    }
    #viewer.two-up .page-wrap { margin-bottom: 0; }

    .page-wrap {
      position: relative;
      margin-bottom: .6rem;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 2px 14px rgba(0,0,0,.13);
      overflow: hidden;
    }
    .page-wrap canvas {
      width: 100%;
      display: block;
      background: #fff;
    }
    .page-wrap.placeholder {
      background: #e7ecf1;
      box-shadow: none;
    }
    .page-wrap.placeholder::before {
      content: attr(data-page-num);
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b3bdc9;
      font-size: 1rem;
      font-weight: 500;
    }
    .page-num {
      position: absolute;
      bottom: .4rem;
      right: .6rem;
      font-size: .65rem;
      background: rgba(0,0,0,.38);
      color: #fff;
      padding: .15rem .45rem;
      border-radius: 3px;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Text layer ── */
    .textLayer {
      position: absolute;
      top: 0; left: 0;
      overflow: hidden;
      line-height: 1;
      z-index: 1;
    }
    .textLayer span,
    .textLayer br {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
      user-select: text;
    }
    .textLayer ::selection      { background: rgba(0,100,255,.25); color: transparent; }
    .textLayer ::-moz-selection { background: rgba(0,100,255,.25); color: transparent; }

    #status {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: #8a9ab0;
      gap: .7rem;
      font-size: .9rem;
    }
    #status .big { font-size: 2.5rem; }

    .progress-bar {
      width: 220px;
      height: 3px;
      background: #dde1e7;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .15s;
    }

    /* ── Skins ── */
    /* Gold (금장) — adds an ornate frame around each page without
       cropping the slide. Painted via ::after at z-index: -1 inside
       an isolated stacking context, so it sits outside the page box. */
    #viewer.skin-gold .page-wrap {
      position: relative;
      isolation: isolate;
      overflow: visible; /* let ::after frame paint outside the page box */
      box-shadow: none;
      border-radius: 3px;
      margin-bottom: 28px;
    }
    #viewer.skin-gold.two-up { gap: 28px; }
    #viewer.skin-gold .page-wrap:last-child { margin-bottom: 0; }
    @keyframes goldShimmer {
      0%   { background-position:   0% 50%; }
      100% { background-position: 200% 50%; }
    }
    #viewer.skin-gold .page-wrap::after {
      content: '';
      position: absolute;
      inset: -11px;
      z-index: -1;
      pointer-events: none;
      border-radius: 7px;
      background: linear-gradient(110deg,
        #826410   0%,
        #B8860B   8%,
        #D4AF37  16%,
        #E6BE44  22%,
        #FFD700  28%,
        #FFFFEE  32%,   /* highlight peak 1 */
        #FFD700  36%,
        #E6BE44  44%,
        #D4AF37  50%,   /* mid stays luminous gold (no brown trough) */
        #E6BE44  56%,
        #FFD700  64%,
        #FFFFEE  68%,   /* highlight peak 2 */
        #FFD700  72%,
        #E6BE44  78%,
        #D4AF37  84%,
        #B8860B  92%,
        #826410 100%);
      background-size: 200% 100%;
      background-position: 0% 50%;
      animation: goldShimmer 5s linear infinite;
      box-shadow:
        0 8px 28px rgba(212, 175, 55, 0.6),
        inset 0 0 0 1px rgba(82, 60, 8, 0.55),
        inset 0 0 0 10px rgba(255, 248, 180, 0.55),
        inset 0 0 0 11px rgba(82, 60, 8, 0.55);
    }
    @media (prefers-reduced-motion: reduce) {
      #viewer.skin-gold .page-wrap::after { animation: none; }
    }

    /* Neon (네온) — magenta/purple/cyan glow with hue-rotate cycling */
    @keyframes neonShimmer {
      0%   { background-position:   0% 50%; }
      100% { background-position: 200% 50%; }
    }
    @keyframes neonHue {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    #viewer.skin-neon .page-wrap {
      position: relative;
      isolation: isolate;
      overflow: visible;
      box-shadow: none;
      border-radius: 3px;
      margin-bottom: 36px;
    }
    #viewer.skin-neon.two-up { gap: 36px; }
    #viewer.skin-neon .page-wrap:last-child { margin-bottom: 0; }
    #viewer.skin-neon .page-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      z-index: -1;
      pointer-events: none;
      border-radius: 6px;
      background: linear-gradient(110deg,
        #ff00ff   0%,
        #ff44cc  14%,
        #cc00ff  28%,
        #6600ff  42%,
        #00ccff  56%,
        #cc00ff  70%,
        #ff44cc  84%,
        #ff00ff 100%);
      background-size: 200% 100%;
      animation:
        neonShimmer 4s linear infinite,
        neonHue     8s linear infinite;
      box-shadow:
        0 0 0 2px #ffffff,
        0 0 12px rgba(255,   0, 255, 0.9),
        0 0 28px rgba(255,   0, 255, 0.7),
        0 0 56px rgba(170,   0, 255, 0.5),
        0 0 90px rgba(  0, 200, 255, 0.3);
    }
    #viewer.skin-neon .page-wrap.placeholder {
      background: #f5f0ff;
    }
    #viewer.skin-neon .page-wrap.placeholder::before {
      color: #aa00ff;
    }
    @media (prefers-reduced-motion: reduce) {
      #viewer.skin-neon .page-wrap::after { animation: none; }
    }

    /* ── Theme-matching skins ── */

    /* Blueprint (청사진) */
    #viewer.skin-blueprint .page-wrap {
      position: relative; isolation: isolate; overflow: visible;
      box-shadow: none; border-radius: 3px; margin-bottom: 28px;
    }
    #viewer.skin-blueprint.two-up { gap: 28px; }
    #viewer.skin-blueprint .page-wrap:last-child { margin-bottom: 0; }
    #viewer.skin-blueprint .page-wrap::after {
      content: ''; position: absolute; inset: -10px; z-index: -1;
      pointer-events: none; border-radius: 5px;
      background:
        linear-gradient(0deg,  transparent 49%, rgba(255,255,255,0.22) 49% 51%, transparent 51%) 0 0 / 100% 14px,
        linear-gradient(90deg, transparent 49%, rgba(255,255,255,0.22) 49% 51%, transparent 51%) 0 0 / 14px 100%,
        linear-gradient(135deg, #143a5c, #1d4f7a, #143a5c);
      box-shadow:
        0 6px 22px rgba(20, 58, 92, 0.5),
        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
    }
    #viewer.skin-blueprint .page-wrap.placeholder {
      background: #e6efff;
    }
    #viewer.skin-blueprint .page-wrap.placeholder::before { color: #1d4f7a; }

    /* PCB (회로기판) */
    #viewer.skin-pcb .page-wrap {
      position: relative; isolation: isolate; overflow: visible;
      box-shadow: none; border-radius: 3px; margin-bottom: 28px;
    }
    #viewer.skin-pcb.two-up { gap: 28px; }
    #viewer.skin-pcb .page-wrap:last-child { margin-bottom: 0; }
    #viewer.skin-pcb .page-wrap::after {
      content: ''; position: absolute; inset: -10px; z-index: -1;
      pointer-events: none; border-radius: 5px;
      background:
        radial-gradient(circle at 6px 6px, #d4af37 1.6px, transparent 2.2px) 0 0 / 18px 18px,
        linear-gradient(135deg, #0a3d1f, #1a5a32 50%, #0a3d1f);
      box-shadow:
        0 4px 18px rgba(0, 0, 0, 0.4),
        inset 0 0 0 1px rgba(212, 175, 55, 0.45),
        inset 0 0 0 9px transparent,
        inset 0 0 0 10px rgba(212, 175, 55, 0.25);
    }
    #viewer.skin-pcb .page-wrap.placeholder {
      background: #d4e8d8;
    }
    #viewer.skin-pcb .page-wrap.placeholder::before { color: #1a5a32; }

    /* Matrix (매트릭스) — green light cascading down */
    @keyframes matrixRain {
      0%   { background-position: 0 -50%; }
      100% { background-position: 0 150%; }
    }
    #viewer.skin-matrix .page-wrap {
      position: relative; isolation: isolate; overflow: visible;
      box-shadow: none; border-radius: 3px; margin-bottom: 32px;
    }
    #viewer.skin-matrix.two-up { gap: 32px; }
    #viewer.skin-matrix .page-wrap:last-child { margin-bottom: 0; }
    #viewer.skin-matrix .page-wrap::after {
      content: ''; position: absolute; inset: -9px; z-index: -1;
      pointer-events: none; border-radius: 4px;
      background:
        linear-gradient(180deg,
          transparent 0%, rgba(0,255,65,0.0) 30%,
          rgba(0,255,65,0.7) 50%,
          rgba(0,255,65,0.0) 70%, transparent 100%),
        linear-gradient(180deg, #001008, #003015, #001a08);
      background-size: 100% 200%, 100% 100%;
      background-repeat: no-repeat, no-repeat;
      animation: matrixRain 3.5s linear infinite;
      box-shadow:
        0 0 14px rgba(0, 255, 65, 0.55),
        0 0 28px rgba(0, 200, 50, 0.3),
        inset 0 0 0 1px rgba(0, 255, 65, 0.6);
    }
    #viewer.skin-matrix .page-wrap.placeholder { background: #001a08; }
    #viewer.skin-matrix .page-wrap.placeholder::before {
      color: #00ff41; font-family: ui-monospace, Consolas, monospace;
    }
    @media (prefers-reduced-motion: reduce) {
      #viewer.skin-matrix .page-wrap::after { animation: none; }
    }

    /* ── Mood skins ── */

    /* Mahogany (마호가니 우드) */
    #viewer.skin-mahogany .page-wrap {
      position: relative; isolation: isolate; overflow: visible;
      box-shadow: none; border-radius: 3px; margin-bottom: 28px;
    }
    #viewer.skin-mahogany.two-up { gap: 28px; }
    #viewer.skin-mahogany .page-wrap:last-child { margin-bottom: 0; }
    #viewer.skin-mahogany .page-wrap::after {
      content: ''; position: absolute; inset: -11px; z-index: -1;
      pointer-events: none; border-radius: 6px;
      background:
        repeating-linear-gradient(180deg,
          rgba(0,0,0,0.0) 0px, rgba(0,0,0,0.18) 2px,
          rgba(0,0,0,0.0) 4px, rgba(0,0,0,0.10) 7px,
          rgba(0,0,0,0.0) 11px),
        linear-gradient(135deg, #4a2515 0%, #6b3520 30%, #8b4527 50%, #6b3520 70%, #4a2515 100%);
      box-shadow:
        0 8px 24px rgba(40, 18, 8, 0.55),
        inset 0 0 0 1px rgba(20, 8, 0, 0.6),
        inset 0 0 0 6px rgba(255, 200, 150, 0.10),
        inset 0 0 0 7px rgba(20, 8, 0, 0.4);
    }

    /* Carbon (카본파이버) — diagonal weave */
    #viewer.skin-carbon .page-wrap {
      position: relative; isolation: isolate; overflow: visible;
      box-shadow: none; border-radius: 3px; margin-bottom: 26px;
    }
    #viewer.skin-carbon.two-up { gap: 26px; }
    #viewer.skin-carbon .page-wrap:last-child { margin-bottom: 0; }
    #viewer.skin-carbon .page-wrap::after {
      content: ''; position: absolute; inset: -8px; z-index: -1;
      pointer-events: none; border-radius: 4px;
      background:
        linear-gradient(45deg,  #1a1a1a 25%, transparent 25%) 0 0 / 6px 6px,
        linear-gradient(-45deg, #1a1a1a 25%, transparent 25%) 0 0 / 6px 6px,
        linear-gradient(45deg,  transparent 75%, #1a1a1a 75%) 3px 3px / 6px 6px,
        linear-gradient(-45deg, transparent 75%, #1a1a1a 75%) 3px 3px / 6px 6px,
        #2a2a2a;
      box-shadow:
        0 4px 14px rgba(0, 0, 0, 0.55),
        inset 0 0 0 1px #4a4a4a;
    }

    /* Dark (다크 모드 + 청색 미세 발광) */
    #viewer.skin-dark .page-wrap {
      position: relative; isolation: isolate; overflow: visible;
      box-shadow: none; border-radius: 3px; margin-bottom: 26px;
    }
    #viewer.skin-dark.two-up { gap: 26px; }
    #viewer.skin-dark .page-wrap:last-child { margin-bottom: 0; }
    #viewer.skin-dark .page-wrap::after {
      content: ''; position: absolute; inset: -8px; z-index: -1;
      pointer-events: none; border-radius: 4px;
      background: linear-gradient(135deg, #1a1a1a, #0a0a0a 50%, #1a1a1a);
      box-shadow:
        0 0 18px rgba(74, 144, 226, 0.35),
        0 0 36px rgba(74, 144, 226, 0.18),
        inset 0 0 0 1px rgba(74, 144, 226, 0.5);
    }

    /* Paper (종이 노트) */
    #viewer.skin-paper .page-wrap {
      position: relative; isolation: isolate; overflow: visible;
      box-shadow: none; border-radius: 2px; margin-bottom: 28px;
    }
    #viewer.skin-paper.two-up { gap: 28px; }
    #viewer.skin-paper .page-wrap:last-child { margin-bottom: 0; }
    #viewer.skin-paper .page-wrap::after {
      content: ''; position: absolute; inset: -10px; z-index: -1;
      pointer-events: none; border-radius: 3px;

<script type="module">
  const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
  const { getDocument, GlobalWorkerOptions } = pdfjsLib;
  const renderTextLayer = pdfjsLib.renderTextLayer ?? pdfjsLib.default?.renderTextLayer;
  GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

  const PDF_LOCAL = 'output/lecture_all_v2.pdf';
  const PDF_CDN   = 'https://cdn.jsdelivr.net/gh/gisbi-kim/modern-robot-state-estimation@main/output/lecture_all_v2.pdf';

  async function resolvePdfUrl() {
    try {
      const r = await fetch(PDF_LOCAL, { method: 'HEAD' });
      if (r.ok) return PDF_LOCAL;
    } catch {}
    return PDF_CDN;
  }

  const navEl         = document.querySelector('nav');
  const viewer        = document.getElementById('viewer');
  const status        = document.getElementById('status');
  const statusMsg     = document.getElementById('status-msg');
  const toolbar       = document.getElementById('toolbar');
  const tbPagesTotal  = document.getElementById('toolbar-pages-total');
  const main          = document.getElementById('main');
  const tocEl         = document.getElementById('toc');
  const tocLabel      = document.getElementById('toc-label');
  const pageInput     = document.getElementById('page-input');
  const searchInput   = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');

  // page-wrap elements indexed by 0-based page index
  const pageEls = [];
  // page index → outline item DOM (for active highlighting)
  const sectionStartPages = []; // sorted [{ page, navEl }]

  let pdf;
  let renderInFlight = new Map(); // pageIdx → promise
  const renderedPages = new Set();

  let aspectRatio   = 9 / 16;     // height per width — captured from page 1
  let layout        = 'one-up';   // 'one-up' | 'two-up'
  let renderGen     = 0;          // bumps on layout change → in-flight renders abort
  let currentPageIdx = 0;         // topmost visible page (for keyboard nav)
  let pageIO        = null;
  let sectionIO     = null;
  let zoomLevel     = 1.0;        // 0.5 ~ 2.0
  let zoomDebounceTimer = null;

  const SKINS = [
    { cls: null,             label: '스킨',     btnCls: null                 },
    { cls: 'skin-gold',      label: '금장',     btnCls: 'skin-gold-btn'      },
    { cls: 'skin-neon',      label: '네온',     btnCls: 'skin-neon-btn'      },
    { cls: 'skin-blueprint', label: '청사진',   btnCls: 'skin-blueprint-btn' },
    { cls: 'skin-pcb',       label: 'PCB',     btnCls: 'skin-pcb-btn'       },
    { cls: 'skin-matrix',    label: '매트릭스', btnCls: 'skin-matrix-btn'    },
    { cls: 'skin-mahogany',  label: '마호가니', btnCls: 'skin-mahogany-btn'  },
    { cls: 'skin-carbon',    label: '카본',     btnCls: 'skin-carbon-btn'    },
    { cls: 'skin-dark',      label: '다크',     btnCls: 'skin-dark-btn'      },
    { cls: 'skin-paper',     label: '종이',     btnCls: 'skin-paper-btn'     },
    { cls: 'skin-holo',      label: '홀로그램', btnCls: 'skin-holo-btn'      },
    { cls: 'skin-aurora',    label: '오로라',   btnCls: 'skin-aurora-btn'    },
  ];
  let skinIdx = 0;

  let textIndex          = null;   // [{ pageIdx, text }] — built lazily on first search
  let indexBuildPromise  = null;
  let searchDebounceTimer = null;
  let urlUpdateTimer     = null;

  const RELAYOUT_THROTTLE_MS = 1000;
  let relayoutLastFire    = 0;
  let relayoutPendingTimer = null;
  const ZOOM_MIN = 0.5, ZOOM_MAX = 2.0, ZOOM_STEP = 0.1;
  const BASE_W_ONE_UP = 1040, BASE_W_TWO_UP = 1700;

  async function init() {
    const url = await resolvePdfUrl();
    pdf = await getDocument(url).promise;
    const n = pdf.numPages;

    // On phones: collapse sidebar BEFORE measuring page width so placeholders
    // are sized for the wider main column the user actually sees.
    if (window.innerWidth < 768) {
      navEl.classList.add('collapsed');
    }

    // measure first page to size all placeholders identically
    // (Beamer slides are uniform 16:9)
    const probe = document.createElement('div');
    probe.className = 'page-wrap';
    probe.style.visibility = 'hidden';
    viewer.appendChild(probe);
    const cssW = probe.getBoundingClientRect().width;
    viewer.removeChild(probe);

    const firstPage = await pdf.getPage(1);
    const vp0 = firstPage.getViewport({ scale: 1 });
    aspectRatio = vp0.height / vp0.width;
    const placeholderH = Math.round(cssW * aspectRatio);

    // sidebar
    await buildOutline();

    // create placeholders for every page
    for (let i = 1; i <= n; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'page-wrap placeholder';
      wrap.style.height = placeholderH + 'px';
      wrap.dataset.page = i;
      wrap.dataset.pageNum = `${i} / ${n}`;
      pageEls.push(wrap);
      viewer.appendChild(wrap);
    }

    // toolbar
    tbPagesTotal.textContent = `/ ${n}`;
    pageInput.max = n;
    pageInput.value = 1;
    toolbar.style.display = 'flex';
    status.style.display = 'none';

    setupLazyRender();
    setupActiveSectionTracking();
    setupKeyboardNav();
    setupLayoutToggle();
    setupZoom();
    setupSkinToggle();
    setupPageInput();
    setupSearch();
    setupSidebarToggle();
    syncScrollPadding();
    window.addEventListener('resize', () => {
      syncScrollPadding();   // cheap, run every event
      throttledRelayout();   // heavy, throttled to 1/sec
    });

    // honor ?page=N from the URL
    const requested = parseInt(new URLSearchParams(location.search).get('page') || '', 10);
    if (Number.isFinite(requested) && requested >= 1 && requested <= n) {
      requestAnimationFrame(() => jumpToPage(requested - 1));
    }
  }

  /* ─── Outline (TOC) ─── */

  async function resolveDest(dest) {
    if (!dest) return null;
    if (typeof dest === 'string') {
      try { dest = await pdf.getDestination(dest); } catch { return null; }
    }
    if (!Array.isArray(dest) || !dest[0]) return null;
    try {
      const idx = await pdf.getPageIndex(dest[0]);
      return idx; // 0-based
    } catch { return null; }
  }

  async function flattenOutline(items, depth, out) {
    for (const item of items || []) {
      const pageIdx = await resolveDest(item.dest);
      out.push({ title: item.title, pageIdx, depth });
      if (item.items && item.items.length) {
        await flattenOutline(item.items, depth + 1, out);
      }
    }
  }

  async function buildOutline() {
    let outline = null;
    try { outline = await pdf.getOutline(); } catch {}

    if (!outline || outline.length === 0) {
      tocLabel.textContent = '전체 PDF';
      const div = document.createElement('div');
      div.className = 'nav-item active';
      div.textContent = '처음으로';
      div.addEventListener('click', () => jumpToPage(0));
      tocEl.appendChild(div);
      return;
    }

    const flat = [];
    await flattenOutline(outline, 0, flat);

    tocLabel.textContent = '목차';

    // 사이드바 맨 위: "처음으로" (표지 페이지로 점프, active 추적 대상 아님)
    {
      const div = document.createElement('div');
      div.className = 'nav-item';
      div.style.paddingLeft = '1.1rem';
      div.dataset.page = 0;

      const label = document.createElement('span');
      label.textContent = '처음으로';
      div.appendChild(label);

      const pg = document.createElement('span');
      pg.className = 'pg';
      pg.textContent = 'p.1';
      div.appendChild(pg);

      div.addEventListener('click', () => {
        setActive(div);
        jumpToPage(0);
      });
      tocEl.appendChild(div);
    }

    flat.forEach(({ title, pageIdx, depth }) => {
      const div = document.createElement('div');
      div.className = 'nav-item';
      div.style.paddingLeft = (1.1 + depth * 0.85) + 'rem';
      div.dataset.page = pageIdx ?? '';

      const label = document.createElement('span');
      label.textContent = title;
      div.appendChild(label);

      if (pageIdx != null) {
        const pg = document.createElement('span');
        pg.className = 'pg';
        pg.textContent = `p.${pageIdx + 1}`;
        div.appendChild(pg);

        div.addEventListener('click', () => {
          setActive(div);
          jumpToPage(pageIdx);
        });
        sectionStartPages.push({ page: pageIdx, navEl: div });
      }
      tocEl.appendChild(div);
    });

    // 정적 추가: PDF outline에 안 잡히는 마무리 챕터 (p.906~)
    const FINAL_PAGE_IDX = 905; // 0-based
    if (FINAL_PAGE_IDX < pdf.numPages) {
      const div = document.createElement('div');
      div.className = 'nav-item';
      div.style.paddingLeft = '1.1rem';
      div.dataset.page = FINAL_PAGE_IDX;

      const label = document.createElement('span');
      label.textContent = '마무리';
      div.appendChild(label);

      const pg = document.createElement('span');
      pg.className = 'pg';
      pg.textContent = `p.${FINAL_PAGE_IDX + 1}`;
      div.appendChild(pg);

      div.addEventListener('click', () => {
        setActive(div);
        jumpToPage(FINAL_PAGE_IDX);
      });
      sectionStartPages.push({ page: FINAL_PAGE_IDX, navEl: div });
      tocEl.appendChild(div);
    }

    sectionStartPages.sort((a, b) => a.page - b.page);
    if (sectionStartPages[0]) setActive(sectionStartPages[0].navEl);
  }

  function setActive(el) {
    tocEl.querySelectorAll('.nav-item.active').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    // keep active item visible in sidebar
    const navEl = document.querySelector('nav');
    const r = el.getBoundingClientRect();
    const nr = navEl.getBoundingClientRect();
    if (r.top < nr.top || r.bottom > nr.bottom) {
      el.scrollIntoView({ block: 'nearest' });
    }
  }

  function jumpToPage(idx) {
    const el = pageEls[idx];
    if (!el) return;
    currentPageIdx = idx;
    el.scrollIntoView({ block: 'start' });
    syncPageUI();
  }

  /* ─── Lazy rendering ─── */

  function setupLazyRender() {
    if (pageIO) pageIO.disconnect();
    pageIO = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const idx = parseInt(entry.target.dataset.page, 10) - 1;
          renderPage(idx);
        }
      });
    }, {
      root: main,
      rootMargin: '600px 0px 600px 0px',
    });
    pageEls.forEach(el => pageIO.observe(el));
  }

  async function renderPage(idx) {
    if (renderedPages.has(idx)) return;
    if (renderInFlight.has(idx)) return renderInFlight.get(idx);

    const wrap = pageEls[idx];
    const myGen = renderGen;

    const promise = (async () => {
      const page = await pdf.getPage(idx + 1);
      if (myGen !== renderGen) return;

      // Allow DPR up to 3 so high-density phones (iPhone Pro etc.) render sharp.
      // 4096-px canvas cap is still well within iOS Safari's limits at typical
      // mobile widths (cssW × 3 ≈ 1080).
      const DPR  = Math.min(window.devicePixelRatio || 1, 3);
      const cssW = wrap.getBoundingClientRect().width;
      const vp0  = page.getViewport({ scale: 1 });
      const scale    = (cssW * DPR) / vp0.width;
      const vp       = page.getViewport({ scale });
      const cssScale = cssW / vp0.width;
      const vpCSS    = page.getViewport({ scale: cssScale });

      const canvas = document.createElement('canvas');
      canvas.width  = vp.width;
      canvas.height = vp.height;

      const renderTask = page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
      try {
        await renderTask.promise;
      } catch (e) {
        if (e && e.name === 'RenderingCancelledException') return;
        throw e;
      }
      if (myGen !== renderGen) return;

      const textLayerDiv = document.createElement('div');
      textLayerDiv.className = 'textLayer';
      textLayerDiv.style.width  = vpCSS.width  + 'px';
      textLayerDiv.style.height = vpCSS.height + 'px';

      const num = document.createElement('div');
      num.className = 'page-num';
      num.textContent = `${idx + 1} / ${pdf.numPages}`;

      wrap.innerHTML = '';
      wrap.classList.remove('placeholder');
      wrap.style.height = ''; // let canvas govern height
      wrap.appendChild(canvas);
      wrap.appendChild(textLayerDiv);
      wrap.appendChild(num);

      if (typeof renderTextLayer === 'function') {
        renderTextLayer({
          textContentSource: page.streamTextContent(),
          container: textLayerDiv,
          viewport: vpCSS,
        });
      }
      renderedPages.add(idx);
    })().catch(err => console.error('render fail p' + (idx+1), err));

    renderInFlight.set(idx, promise);
    promise.finally(() => renderInFlight.delete(idx));
    return promise;
  }

  /* ─── Active section tracking based on scroll ─── */

  function setupActiveSectionTracking() {
    if (sectionIO) sectionIO.disconnect();
    sectionIO = new IntersectionObserver((entries) => {
      // pick the topmost visible page as "current"
      const visible = entries.filter(e => e.isIntersecting)
                             .map(e => parseInt(e.target.dataset.page, 10) - 1)
                             .sort((a, b) => a - b);
      if (!visible.length) return;
      const cur = visible[0];
      currentPageIdx = cur;
      syncPageUI();

      if (!sectionStartPages.length) return;
      // find largest sectionStartPages.page <= cur
      let active = sectionStartPages[0];
      for (const s of sectionStartPages) {
        if (s.page <= cur) active = s; else break;
      }
      if (active && !active.navEl.classList.contains('active')) {
        setActive(active.navEl);
      }
    }, {
      root: main,
      rootMargin: '-10% 0px -80% 0px',
    });
    pageEls.forEach(el => sectionIO.observe(el));
  }

  /* ─── Keyboard navigation ─── */

  function setupKeyboardNav() {
    document.addEventListener('keydown', (e) => {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;

      if (e.ctrlKey || e.metaKey) {
        if (e.key === '=' || e.key === '+') { e.preventDefault(); setZoom(zoomLevel + ZOOM_STEP); return; }
        if (e.key === '-')                  { e.preventDefault(); setZoom(zoomLevel - ZOOM_STEP); return; }
        if (e.key === '0')                  { e.preventDefault(); setZoom(1.0); return; }
        if (e.key === 'f' || e.key === 'F') { e.preventDefault(); searchInput.focus(); searchInput.select(); return; }
        if (e.key === 'g' || e.key === 'G') { e.preventDefault(); pageInput.focus(); pageInput.select(); return; }
        return; // don't shadow other Ctrl shortcuts
      }
      if (e.altKey) return;

      let delta = 0;
      if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') delta = 1;
      else if (e.key === 'ArrowUp' || e.key === 'PageUp') delta = -1;
      else if (e.key === 'Home') { e.preventDefault(); jumpToPage(0); return; }
      else if (e.key === 'End')  { e.preventDefault(); jumpToPage(pdf.numPages - 1); return; }
      else if (e.key === 'b' || e.key === 'B') { e.preventDefault(); toggleSidebar(); return; }
      else return;

      e.preventDefault();
      const step = layout === 'two-up' ? 2 : 1;
      const next = Math.max(0, Math.min(pdf.numPages - 1, currentPageIdx + delta * step));
      jumpToPage(next);
    });
  }

  /* ─── Layout toggle (1쪽 ↔ 2쪽) ─── */

  function setupLayoutToggle() {
    const btn = document.getElementById('layout-toggle');
    btn.addEventListener('click', () => toggleLayout(btn));
  }

  function toggleLayout(btn) {
    layout = layout === 'one-up' ? 'two-up' : 'one-up';
    viewer.classList.toggle('two-up', layout === 'two-up');
    btn.textContent = layout === 'two-up' ? '1쪽 보기' : '2쪽 보기';
    applyViewerWidth();
    relayout();
  }

  /* ─── Zoom ─── */

  function setupZoom() {
    document.getElementById('zoom-in').addEventListener('click',
      () => setZoom(zoomLevel + ZOOM_STEP));
    document.getElementById('zoom-out').addEventListener('click',
      () => setZoom(zoomLevel - ZOOM_STEP));
    document.getElementById('zoom-label').addEventListener('click',
      () => setZoom(1.0));

    // Ctrl/Cmd + wheel
    main.addEventListener('wheel', (e) => {
      if (!e.ctrlKey && !e.metaKey) return;
      e.preventDefault();
      const dir = e.deltaY < 0 ? 1 : -1;
      setZoom(zoomLevel + dir * ZOOM_STEP);
    }, { passive: false });

    applyViewerWidth(); // ensure inline max-width matches initial zoom
  }

  function applyViewerWidth() {
    const baseW = layout === 'two-up' ? BASE_W_TWO_UP : BASE_W_ONE_UP;
    viewer.style.maxWidth = (baseW * zoomLevel) + 'px';
  }

  function setZoom(z) {
    const clamped = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.round(z * 100) / 100));
    if (Math.abs(clamped - zoomLevel) < 0.001) return;
    zoomLevel = clamped;
    document.getElementById('zoom-label').textContent = Math.round(zoomLevel * 100) + '%';
    applyViewerWidth();
    // debounce the heavy relayout — wheel fires fast
    clearTimeout(zoomDebounceTimer);
    zoomDebounceTimer = setTimeout(() => relayout(), 150);
  }

  /* ─── Skins ─── */

  function setupSkinToggle() {
    const btn = document.getElementById('skin-toggle');
    btn.textContent = SKINS[skinIdx].label; // sync initial label with current state
    btn.addEventListener('click', () => {
      // clear all skin classes from viewer + button
      for (const s of SKINS) {
        if (s.cls)    viewer.classList.remove(s.cls);
        if (s.btnCls) btn.classList.remove(s.btnCls);
      }
      skinIdx = (skinIdx + 1) % SKINS.length;
      const cur = SKINS[skinIdx];
      if (cur.cls)    viewer.classList.add(cur.cls);
      if (cur.btnCls) btn.classList.add(cur.btnCls);
      btn.classList.toggle('active', skinIdx !== 0);
      btn.textContent = cur.label;
    });
  }

  /* ─── Shared relayout (used by toggle + zoom) ─── */

  function relayout() {
    renderGen++;
    requestAnimationFrame(() => {
      const cssW = pageEls[0].getBoundingClientRect().width;
      const placeholderH = Math.round(cssW * aspectRatio);

      pageEls.forEach((wrap) => {
        wrap.innerHTML = '';
        wrap.classList.add('placeholder');
        wrap.style.height = placeholderH + 'px';
      });
      renderedPages.clear();

      setupLazyRender();
      setupActiveSectionTracking();
      jumpToPage(currentPageIdx);
    });
  }

  // Throttle relayout for resize / sidebar-toggle: leading edge fires immediately,
  // trailing edge guarantees the final width is rendered after a drag stops.
  function throttledRelayout() {
    const now = Date.now();
    const since = now - relayoutLastFire;

    if (since >= RELAYOUT_THROTTLE_MS) {
      if (relayoutPendingTimer) {
        clearTimeout(relayoutPendingTimer);
        relayoutPendingTimer = null;
      }
      relayoutLastFire = now;
      relayout();
    } else if (!relayoutPendingTimer) {
      relayoutPendingTimer = setTimeout(() => {
        relayoutPendingTimer = null;
        relayoutLastFire = Date.now();
        relayout();
      }, RELAYOUT_THROTTLE_MS - since);
    }
  }

  /* ─── Sidebar toggle ─── */

  function toggleSidebar(force) {
    const willCollapse = (typeof force === 'boolean') ? force : !navEl.classList.contains('collapsed');
    navEl.classList.toggle('collapsed', willCollapse);
    const btn = document.getElementById('sidebar-toggle');
    if (btn) btn.classList.toggle('active', willCollapse);
    // main column width changed → re-render visible pages at the right resolution
    throttledRelayout();
  }

  function setupSidebarToggle() {
    const btn = document.getElementById('sidebar-toggle');
    btn.addEventListener('click', () => toggleSidebar());
    // sync button state with the (possibly already-collapsed) sidebar
    btn.classList.toggle('active', navEl.classList.contains('collapsed'));
  }

  /* Toolbar wraps to multiple rows on phones — keep scroll-padding-top in sync
     so jumps land below it, never under it. */
  function syncScrollPadding() {
    if (!toolbar) return;
    const h = toolbar.offsetHeight;
    if (h > 0) main.style.scrollPaddingTop = (h + 6) + 'px';
  }

  /* ─── Page input + URL sync ─── */

  function syncPageUI() {
    if (pageInput && document.activeElement !== pageInput) {
      pageInput.value = currentPageIdx + 1;
    }
    scheduleUrlUpdate();
  }

  function scheduleUrlUpdate() {
    clearTimeout(urlUpdateTimer);
    urlUpdateTimer = setTimeout(() => {
      const params = new URLSearchParams(location.search);
      params.set('page', currentPageIdx + 1);
      history.replaceState(null, '', '?' + params.toString());
    }, 300);
  }

  function setupPageInput() {
    const commit = () => {
      const v = parseInt(pageInput.value, 10);
      if (Number.isFinite(v) && v >= 1 && v <= pdf.numPages) {
        jumpToPage(v - 1);
      } else {
        pageInput.value = currentPageIdx + 1;
      }
    };
    pageInput.addEventListener('change', commit);
    pageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { commit(); pageInput.blur(); }
      else if (e.key === 'Escape') {
        pageInput.value = currentPageIdx + 1;
        pageInput.blur();
      }
    });
    pageInput.addEventListener('focus', () => pageInput.select());
  }

  /* ─── Search ─── */

  function buildTextIndex() {
    if (indexBuildPromise) return indexBuildPromise;
    indexBuildPromise = (async () => {
      const idx = [];
      const CHUNK = 30;
      for (let start = 0; start < pdf.numPages; start += CHUNK) {
        const ids = [];
        for (let k = 0; k < CHUNK && (start + k) < pdf.numPages; k++) ids.push(start + k + 1);
        const pages = await Promise.all(ids.map(id => pdf.getPage(id)));
        const contents = await Promise.all(pages.map(p => p.getTextContent()));
        contents.forEach((tc, i) => {
          const text = tc.items.map(it => it.str).join(' ');
          idx.push({ pageIdx: ids[i] - 1, text });
        });
      }
      textIndex = idx;
      return idx;
    })();
    return indexBuildPromise;
  }

  function setupSearch() {
    searchInput.addEventListener('input', () => {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => doSearch(searchInput.value), 200);
    });
    searchInput.addEventListener('focus', () => {
      if (!textIndex && !indexBuildPromise) {
        searchResults.innerHTML = '<div class="search-status">전체 페이지 인덱싱 중…</div>';
        searchResults.classList.add('open');
        buildTextIndex().then(() => {
          if (searchInput.value.trim()) doSearch(searchInput.value);
          else searchResults.classList.remove('open');
        });
      } else if (searchInput.value.trim()) {
        doSearch(searchInput.value);
      }
    });
    searchInput.addEventListener('blur', () => {
      // delay close so result mousedown can fire first
      setTimeout(() => searchResults.classList.remove('open'), 150);
    });
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        searchInput.value = '';
        searchResults.classList.remove('open');
        searchInput.blur();
      }
    });
  }

  async function doSearch(rawQuery) {
    const query = rawQuery.trim();
    if (!query) {
      searchResults.classList.remove('open');
      searchResults.innerHTML = '';
      return;
    }
    if (!textIndex) {
      searchResults.innerHTML = '<div class="search-status">전체 페이지 인덱싱 중…</div>';
      searchResults.classList.add('open');
      await buildTextIndex();
      // user may have changed query while waiting
      if (searchInput.value.trim() !== query) return;
    }

    const lcQuery = query.toLowerCase();
    const perPage = [];
    let totalHits = 0;
    for (const entry of textIndex) {
      const lc = entry.text.toLowerCase();
      const firstPos = lc.indexOf(lcQuery);
      if (firstPos === -1) continue;
      let hits = 0;
      let p = firstPos;
      while (p !== -1) { hits++; totalHits++; p = lc.indexOf(lcQuery, p + lcQuery.length); }
      perPage.push({
        pageIdx: entry.pageIdx,
        hits,
        ctx: extractContext(entry.text, firstPos, query.length),
      });
      if (perPage.length > 100) break;
    }

    if (!perPage.length) {
      searchResults.innerHTML =
        `<div class="search-status">"${escapeHtml(query)}" 결과 없음</div>`;
      searchResults.classList.add('open');
      return;
    }

    searchResults.innerHTML =
      `<div class="search-status">${totalHits}개 일치 · ${perPage.length}개 페이지</div>` +
      perPage.map(r => `
        <div class="search-result" data-page="${r.pageIdx}">
          <span class="result-page">p.${r.pageIdx + 1}</span>${escapeHtml(r.ctx.before)}<span class="match">${escapeHtml(r.ctx.match)}</span>${escapeHtml(r.ctx.after)}${r.hits > 1 ? ` <span style="opacity:.5">+${r.hits - 1}</span>` : ''}
        </div>`).join('');
    searchResults.classList.add('open');

    searchResults.querySelectorAll('.search-result').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault(); // keep input focus so blur logic doesn't race
        const idx = parseInt(el.dataset.page, 10);
        jumpToPage(idx);
        searchResults.classList.remove('open');
      });
    });
  }

  function extractContext(text, pos, len) {
    const before = Math.max(0, pos - 30);
    const after  = Math.min(text.length, pos + len + 40);
    const prefix = before > 0 ? '…' : '';
    const suffix = after < text.length ? '…' : '';
    return {
      before: prefix + text.slice(before, pos),
      match:  text.slice(pos, pos + len),
      after:  text.slice(pos + len, after) + suffix,
    };
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  /* ─── Boot ─── */

  init().catch(err => {
    statusMsg.textContent = '오류: ' + err.message;
    document.getElementById('prog').style.background = '#c0392b';
  });
</script>
</body>
</html>
